<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>The What's Up Band - Sheet Creator v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Roboto+Mono:wght@700&display=swap');

        :root {
            --page-width: 210mm;
            --page-height: 297mm;
        }

        body { 
            background: #e5e7eb; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        /* Kontejner stránky - fixní A4 */
        .sheet-page {
            width: var(--page-width);
            height: var(--page-height);
            padding: 12mm 15mm;
            margin: 0 auto;
            background: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Hlavička dle templatu */
        .header-grid {
            display: grid;
            grid-template-columns: 1fr 2fr 1fr;
            border-bottom: 3px solid black;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        .header-input {
            border: none;
            background: transparent;
            font-weight: bold;
            outline: none;
        }

        /* Sekce a Osnova */
        .staff-container {
            display: grid;
            grid-template-columns: 45px 1fr 30px;
            gap: 10px;
            align-items: end;
            margin-bottom: 15mm;
        }

        .clef-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 2px solid black;
            padding-right: 8px;
        }

        .clef-img {
            width: 30px;
            margin-bottom: 2px;
        }

        .section-label {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            text-align: center;
            width: 100%;
        }

        /* Takty a linky */
        .bars-wrapper {
            display: flex;
            border-right: 2px solid black;
            position: relative;
        }

        .bar {
            flex: 1;
            height: 12mm;
            border-left: 2px solid black;
            position: relative;
        }

        .chord-row {
            position: absolute;
            top: -28px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
        }

        .chord-input {
            width: 30%;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
            font-weight: bold;
            font-size: 14pt;
            border: none;
            outline: none;
            background: transparent;
        }

        /* Notové linky - 5 linek */
        .lines {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .line { border-top: 1px solid #000; width: 100%; }

        @media print {
            body { background: none; padding: 0; }
            .no-print { display: none !important; }
            .sheet-page { margin: 0; box-shadow: none; }
            .chord-input::placeholder { color: transparent; }
        }
    </style>
</head>
<body>

    <div class="no-print mb-6 flex justify-center gap-4">
        <button onclick="addSection()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">PŘIDAT SEKCI</button>
        <button onclick="exportToPDF()" class="bg-black text-white px-6 py-2 rounded-full font-bold shadow-lg">ULOŽIT DO PDF</button>
    </div>

    <div id="capture-area" class="sheet-page">
        <div class="header-grid">
            <div class="text-sm">
                <div class="flex items-center gap-2">Key: <input type="text" class="header-input w-full border-b border-black" placeholder="C"></div>
                <div class="flex items-center gap-2">BPM: <input type="text" class="header-input w-full border-b border-black" placeholder="120"></div>
            </div>
            <div class="text-center">
                <input type="text" class="header-input text-4xl w-full text-center uppercase tracking-tighter" placeholder="NÁZEV PÍSNĚ">
                <input type="text" class="header-input text-xl w-full text-center italic" placeholder="Interpret">
            </div>
            <div class="text-right text-sm">
                <div class="flex items-center justify-end gap-2">Version: <input type="text" class="header-input w-8 text-right" value="1"></div>
            </div>
        </div>

        <div id="sections-list" class="grid grid-cols-2 gap-x-12 gap-y-10">
            </div>
    </div>

    <script>
        function createSectionHTML() {
            return `
            <div class="staff-container relative group">
                <div class="no-print absolute -left-8 top-0 flex flex-col gap-1">
                    <button onclick="this.closest('.staff-container').remove()" class="text-red-500 font-bold">✕</button>
                </div>
                
                <div class="clef-area">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/G-clef.svg" class="clef-img">
                    <input type="text" class="section-label border-none outline-none" placeholder="VERSE">
                </div>

                <div class="bars-wrapper">
                    ${[1,2,3,4].map(i => `
                        <div class="bar">
                            <div class="chord-row">
                                <input type="text" class="chord-input" placeholder="-">
                                <input type="text" class="chord-input">
                            </div>
                            <div class="lines">
                                <div class="line"></div><div class="line"></div>
                                <div class="line"></div><div class="line"></div>
                                <div class="line"></div>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="flex flex-col items-center">
                    <span class="text-[10px] font-bold">x</span>
                    <input type="text" class="w-full text-center font-bold text-sm border-none outline-none" value="1">
                </div>

                <div class="col-start-2 mt-1">
                    <textarea class="w-full text-[10px] italic border-none outline-none resize-none leading-tight" rows="2" placeholder="Text písně..."></textarea>
                </div>
            </div>`;
        }

        function addSection() {
            document.getElementById('sections-list').insertAdjacentHTML('beforeend', createSectionHTML());
        }

        function exportToPDF() {
            const element = document.getElementById('capture-area');
            const opt = {
                margin: 0,
                filename: 'song-sheet.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { 
                    scale: 4, 
                    useCORS: true,
                    letterRendering: true 
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }

        // Přidat první dvě sekce automaticky při načtení
        addSection();
        addSection();
    </script>
</body>
</html>
