<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Band Sheet Editor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Styl pro "papírový" vzhled A4 */
        .page-a4 {
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 10px auto;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* Skrytí okrajů inputů, aby to vypadalo jako čistý papír */
        input, textarea {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
        }

        input:hover, textarea:hover {
            background: rgba(0,0,0,0.02);
        }

        /* Notová osnova - 5 linek přesně podle tvého vzoru */
        .staff-line {
            border-top: 1px solid #999;
            height: 8px; /* Mezera mezi linkami */
        }
    </style>
</head>
<body class="bg-gray-200">

    <nav class="bg-black text-white p-4 flex justify-between">
        <h1 class="font-bold uppercase tracking-widest">Band Sheet Editor</h1>
        <button onclick="exportPDF()" class="bg-blue-600 px-4 py-1 rounded text-sm hover:bg-blue-500">Export do PDF</button>
    </nav>

    <div id="editor" class="page-a4 font-serif">
        
        <div class="flex justify-between items-start border-b-2 border-black pb-4 mb-8">
            <div class="text-sm space-y-1">
                <div>Key: <input type="text" value="C" class="font-bold w-8 underline"></div>
                <div>BPM: <input type="text" value="103" class="font-bold w-12 underline"></div>
            </div>
            
            <div class="text-center flex-grow">
                <input type="text" value="SONG TITLE" class="text-3xl font-bold text-center uppercase block">
                <input type="text" value="Artist Name" class="text-xl text-center block">
            </div>

            <div class="text-right text-sm italic uppercase">
                Version: <input type="text" value="1" class="w-6 font-bold">
            </div>
        </div>

        <div class="grid grid-cols-2 gap-x-12 gap-y-16">
            
            <div class="relative">
                <div class="flex items-start">
                    <div class="w-12 pr-2 border-r border-gray-300 italic text-[10px] text-center">
                        <input type="text" value="⊖" class="text-lg text-center mb-1">
                        <input type="text" value="VERSE 1" class="font-bold text-center uppercase">
                    </div>

                    <div class="flex-grow ml-4 relative">
                        <div class="flex justify-around mb-1 font-mono font-bold text-lg">
                            <input type="text" value="Am" class="text-center">
                            <input type="text" value="F" class="text-center">
                            <input type="text" value="C" class="text-center">
                        </div>
                        
                        <div class="staff-line"></div>
                        <div class="staff-line"></div>
                        <div class="staff-line"></div>
                        <div class="staff-line"></div>
                        <div class="staff-line" style="border-bottom: 1px solid #999;"></div>
                    </div>

                    <div class="w-8 ml-2 flex items-center font-bold italic">
                        x<input type="text" value="4" class="w-full">
                    </div>
                </div>

                <div class="ml-12 mt-2">
                    <textarea rows="3" class="italic text-sm leading-relaxed">I don't like walking around this old and empty house...</textarea>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        function exportPDF() {
            const element = document.getElementById('editor');
            html2pdf().from(element).save('band-sheet.pdf');
        }
    </script>
</body>
</html>
