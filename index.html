<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Editor nad Templatem</title>
    <style>
        body { background: #ccc; margin: 0; }
        
        .page {
            width: 210mm;
            height: 297mm;
            margin: 20px auto;
            background-color: white;
            background-image: url('pozadi.png'); /* Musíš mít soubor pozadi.png ve stejné složce! */
            background-size: 100% 100%;
            position: relative; /* Nutné pro absolutní pozicování polí */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Styl pro všechna pole, aby byla v editoru vidět, ale při tisku zmizela */
        input, textarea {
            position: absolute;
            border: 1px solid rgba(0,0,255,0.2); /* Slabý modrý rámeček pro tebe */
            background: rgba(255,255,255,0.7);
            font-family: Arial, sans-serif;
            font-weight: bold;
            outline: none;
        }

        /* --- TADY NASTAVUJEŠ POZICE (v milimetrech) --- */

        /* Příklad: Titulek písně */
        #input-title {
            top: 32mm;    /* vzdálenost od horního okraje */
            left: 65mm;   /* vzdálenost od levého okraje */
            width: 80mm;  /* šířka pole */
            height: 12mm;
            font-size: 24pt;
            text-align: center;
        }

        /* Příklad: Pole pro Key */
        #input-key {
            top: 23mm;
            left: 28mm;
            width: 15mm;
            font-size: 12pt;
        }

        @media print {
            .no-print { display: none; }
            .page { margin: 0; box-shadow: none; }
            input { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

    <div class="no-print" style="text-align:center; padding: 10px; background: black; color: white;">
        1. Dej obrázek <b>pozadi.png</b> do složky. 2. Upravuj mm v kódu, dokud pole nesedí na linkách. 
        <button onclick="window.print()">TISK DO PDF</button>
    </div>

    <div class="page">
        <input id="input-title" type="text" placeholder="NÁZEV PÍSNĚ">
        <input id="input-key" type="text" placeholder="C#">
        
        </div>

</body>
</html>
